# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f945a1f8dc845e40aa3462b5ccf13860"
name = "Urgency Stock Count Pro 2"
application_url = "https://charming-celebration-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "https://charming-celebration-production.up.railway.app/webhooks"

[access_scopes]
scopes = "write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [ "https://charming-celebration-production.up.railway.app/auth/callback" ]
